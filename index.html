<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수업 스케줄러</title>
    <link rel="stylesheet" href="calendar.css">
  </head>
  <body>

    <nav class="top-nav">
      <div class="nav-left">
        <button class="nav-arrow" id="prevBtn">&#8249;</button>
        <span class="nav-title" id="monthTitle"></span>
        <button class="nav-arrow" id="nextBtn">&#8250;</button>
      </div>
      <button class="hamburger-btn" id="hamburgerBtn">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <div class="side-overlay" id="sideOverlay"></div>
    <aside class="side-menu" id="sideMenu">
      <div class="side-menu-header">
        <span class="side-menu-title">수업 스케줄러</span>
        <button class="side-close-btn" id="sideCloseBtn">&#10005;</button>
      </div>
      <ul class="side-menu-list">
        <li class="side-menu-item active"  data-href="index.html">달력</li>
        <li class="side-menu-item"         data-href="notice.html">공지사항</li>
        <li class="side-menu-item"         data-href="vacation.html">휴가신청</li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="calendar-container">
        <div class="weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span>
          <span>목</span><span>금</span><span>토</span>
        </div>
        <div class="days" id="daysGrid"></div>
      </div>
      <div class="detail-section">
        <div class="detail-header" id="eventHeader">날짜를 선택하세요</div>
        <div class="event-list" id="eventList"></div>
      </div>
    </main>

    <div id="iosPushBar" class="ios-push-bar" hidden>
      <div class="ios-push-info">
        <div class="ios-push-title">수업 알림 받기</div>
        <div class="ios-push-desc">홈 화면에 추가 후 알림을 허용하세요</div>
      </div>
      <button type="button" id="pushBtn">허용</button>
    </div>

    <script src="./api.js"></script>
    <script src="./nav.js"></script>
    <script src="./calendar.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
