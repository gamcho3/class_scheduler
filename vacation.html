<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>휴가신청</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="icon/android-chrome-192x192.png">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="스케줄러">
    <link rel="stylesheet" href="calendar.css">
  </head>
  <body>

    <nav class="top-nav">
      <span class="nav-page-title">휴가신청</span>
      <button class="hamburger-btn" id="hamburgerBtn">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <div class="side-overlay" id="sideOverlay"></div>
    <aside class="side-menu" id="sideMenu">
      <div class="side-menu-header">
        <span class="side-menu-title">수업 스케줄러</span>
        <button class="side-close-btn" id="sideCloseBtn">&#10005;</button>
      </div>
      <ul class="side-menu-list">
        <li class="side-menu-item"        data-href="index.html">달력</li>
        <li class="side-menu-item"        data-href="notice.html">공지사항</li>
        <li class="side-menu-item active" data-href="vacation.html">휴가신청</li>
      </ul>
    </aside>

    <main class="main-content">
      <form id="vacationForm" class="vacation-form">
        <div class="form-group">
          <label for="vacName">이름</label>
          <input type="text" id="vacName" placeholder="이름을 입력하세요" required>
        </div>
        <div class="form-group">
          <label for="vacDate">신청 날짜</label>
          <input type="date" id="vacDate" required>
        </div>
        <button type="submit" class="submit-btn">신청하기</button>
      </form>
      <div id="vacationSuccess" class="vacation-success" hidden>
        <div class="success-icon">&#10003;</div>
        <p class="success-title">신청 완료</p>
        <p class="success-desc" id="successDesc"></p>
        <button class="back-btn" id="vacResetBtn">다시 신청하기</button>
      </div>
    </main>

    <script src="./api.js"></script>
    <script src="./nav.js"></script>
    <script src="./vacation.js"></script>
  </body>
</html>
